[build]
builder = "DOCKERFILE"

[[services]]
name = "backend"
source = "backend"
dockerfilePath = "backend/Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "frontend"
source = "my-app"
dockerfilePath = "my-app/Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10

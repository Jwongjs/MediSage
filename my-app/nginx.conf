server {
    # Railway injects $PORT at runtime and healthchecks that port — nginx must
    # listen on it, not a hardcoded 80. envsubst fills this from the PORT env
    # var (defaults to 80 for local `docker run`). See Dockerfile templating.
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: if the requested file doesn't exist on disk,
    # serve index.html so React Router can handle the route client-side.
    # Without this, refreshing on /diagnosis returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted static assets for 1 year.
    # Vite appends a content hash to filenames (e.g. main.a3f2bc.js),
    # so new deploys produce new filenames — stale cache is never a problem.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Lightweight health probe for Railway to confirm the container is alive.
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
